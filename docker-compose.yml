services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentistflow}
      POSTGRES_USER: ${POSTGRES_USER:-dentistflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dentistflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentistflow} -d ${POSTGRES_DB:-dentistflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dentist-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
